name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9
        working-directory: android

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      - name: Find and Upload APK
        id: find-apk
        if: always()
        run: |
          echo "## Build Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "=== All APK files ===" >> $GITHUB_STEP_SUMMARY
          find . -name "*.apk" -type f 2>> $GITHUB_STEP_SUMMARY >> $GITHUB_STEP_SUMMARY || echo "None" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=== outputs directory ===" >> $GITHUB_STEP_SUMMARY
          ls -laR android/app/build/outputs/ 2>> $GITHUB_STEP_SUMMARY >> $GITHUB_STEP_SUMMARY || echo "No outputs dir" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          APK=$(find . -name "*.apk" -path "*/debug/*" -type f | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            APK=$(find . -name "*.apk" -type f | head -1)
            if [ -n "$APK" ]; then
              echo "Found APK at: $APK"
              echo "apk_path=$APK" >> $GITHUB_OUTPUT
            else
              echo "NO APK FOUND"
            fi
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.apk_path != ''
        with:
          name: LokMe-debug-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: error
