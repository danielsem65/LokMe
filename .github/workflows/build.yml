name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        id: build
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-output.txt
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> /tmp/build-exit.txt
          exit $(cat /tmp/build-exit.txt | cut -d= -f2)

      - name: Write build log to summary
        if: always()
        run: |
          echo "## Build Log (last 150 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 /tmp/build-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build output captured" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "## Build Exit Code" >> $GITHUB_STEP_SUMMARY
          cat /tmp/build-exit.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "unknown" >> $GITHUB_STEP_SUMMARY

      - name: Find APK
        id: find-apk
        if: success()
        working-directory: android
        run: |
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            echo "NO APK FOUND"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.apk_path != ''
        with:
          name: LokMe-debug-apk
          path: android/${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: error
