name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9
        working-directory: android

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Gradle exit code: $EXIT_CODE"
          exit $EXIT_CODE
        working-directory: android

      - name: List Build Outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Build outputs directory ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: Upload Build Output Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output-log
          path: android/build-output.log
          if-no-files-found: warn

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LokMe-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
